_global:
    is_debug: False
    seed: 10
    nway: 32
    tag: "default"
    root_dir: "/root/EAGLE/runs"
indexing:
    dir_path: /root/EAGLE/index/
    nbits: 2
    bsize: 256
    dim: 128
    kmeans_niters: 20
training:
    resume_ckpt_path: Null
    max_epochs: 1
    # Batch size
    gradient_accumulation_steps: 2
    per_device_train_batch_size: 4
    per_device_eval_batch_size: 4
    # Use distllation
    is_use_distillation: False
    # Optimization
    swa_start_batch_idx: 40000
    is_use_swa: False
    warmup_steps: 2000
    gradient_clip_val: 2.0
    weight_decay: 0.01
    head_learning_rate: 1e-4
    llm_learning_rate: 1e-5
    # Evaluation
    val_check_interval_by_step: 1000
    # eval_steps: 100
    evaluation_strategy: steps
    # Precision
    precision: "16-mixed"
    # Saving
    save_steps: 1000
    output_dir: ./results
    # Logging
    logging_dir: ./logs
    logging_steps: 40
dataset:
    name: beir-msmarco
    dir_path: /root/EAGLE/data/
    corpus_file: corpus.jsonl
    data_cache_file: dataset.cache.lz4
    query_file: queries.jsonl
    d_word_range_file: word_indices.doc.pkl
    d_phrase_range_file: phrase_indices.doc.pkl
    q_word_range_file: word_indices.query.pkl
    q_phrase_range_file: phrase_indices.query.pkl
    cache_nway: 64
    train_contrastive:
        # For debugging
        sample_size: -1
        debug_sample_size: 1000
        negative_start_offset: 50
        data_file: train.jsonl
        qrel_file: qrels/train.tsv
    train_distillation:
        # For debugging
        sample_size: -1
        debug_sample_size: 1000
        negative_start_offset: 0
        data_file: train_distillation_filtered.jsonl
        qrel_file: qrels/train_distillation_filtered.tsv
    val:
        sample_size: -1
        debug_sample_size: 200
        negative_start_offset: 0
        override_nway: 100
        data_file: dev.jsonl
q_tokenizer:
    new_tok_offset: 0
    special_tok: "[QXQ]"
    skip_new_special_token: True
    max_len: 32
d_tokenizer:
    new_tok_offset: 1
    special_tok: "[DXD]"
    skip_new_special_token: True
    max_len: 220
defaults:
    - model: late_interaction
