resume_ckpt_path: Null
max_epochs: 1
# Batch size
gradient_accumulation_steps: 2
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
# Use distllation
is_use_distillation: False
# Optimization
swa_start_batch_idx: 40000
is_use_swa: False
warmup_steps: 2000
gradient_clip_val: 2.0
weight_decay: 0.01
head_learning_rate: 1e-4
llm_learning_rate: 1e-5
# Evaluation
val_check_interval_by_step: 1000
# eval_steps: 100
evaluation_strategy: steps
# Precision
precision: "16-mixed"
# Saving
save_steps: 1000
output_dir: ./results
# Logging
logging_dir: ./logs
logging_steps: 40
# Dataloader
train_num_workers: 1
val_num_workers: 1
test_num_workers: 1
# Tokenization
pad_to_max_length: True
